<ion-header [translucent]="true" mode="ios" class="ion-no-border">
  <ion-toolbar>
    <ion-title> The News </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense" mode="ios" class="ion-no-border">
    <ion-toolbar>
      <ion-title size="large">The News</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-grid>
    <ion-row>
      @for(article of articles;let i = $index; track $index){
      <ion-card>
        <ion-card-subtitle class="ion-margin">
          <span class="text-primary"> {{i+1}}. </span>
          <span class="article-source-name"> {{article.source.name}}</span>
        </ion-card-subtitle>

        <ion-card-title class="ion-padding-horizontal ion-margin-bottom">
          {{article.title}}
        </ion-card-title>

        @if (article.urlToImage) {
        <ion-img [src]="article.urlToImage"></ion-img>
        }
         @if (article.description) {
        <ion-card-content>
          <p>{{ article.description }}</p>
        </ion-card-content>
        }
      </ion-card>
      }
    </ion-row>
  </ion-grid>
</ion-content>
